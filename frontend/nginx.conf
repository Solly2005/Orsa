server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers (defense-in-depth). The CSP allows Angular's bundled
  # scripts and its injected component styles ('unsafe-inline' for <style> only),
  # and same-origin XHR to the /api gateway.
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; font-src 'self'; form-action 'self'" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /healthz {
    access_log off;
    return 200 "ok\n";
  }
}
