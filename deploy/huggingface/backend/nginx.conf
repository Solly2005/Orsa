worker_processes 1;
pid /tmp/orsa-nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  access_log /dev/stdout;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 64m;
  client_body_temp_path /tmp/orsa-nginx-client-body;
  proxy_temp_path /tmp/orsa-nginx-proxy;
  fastcgi_temp_path /tmp/orsa-nginx-fastcgi;
  uwsgi_temp_path /tmp/orsa-nginx-uwsgi;
  scgi_temp_path /tmp/orsa-nginx-scgi;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Connection "";
  proxy_read_timeout 120s;
  proxy_send_timeout 120s;

  server {
    listen 7860;
    server_name _;

    location /auth/ {
      proxy_pass http://127.0.0.1:8085;
    }

    location = /csharp/healthz {
      proxy_pass http://127.0.0.1:8085/healthz;
    }

    location / {
      proxy_pass http://127.0.0.1:3000;
    }
  }
}
